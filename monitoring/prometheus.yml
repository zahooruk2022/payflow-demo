global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: payflow-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8080
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: payflow-api
